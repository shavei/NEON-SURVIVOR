# Render Blueprint — NEON SURVIVOR authoritative game server (server/game-server.js).
# Render auto-detects this file when you create a Blueprint from the repo. For an EXISTING Web Service
# created in the dashboard, just mirror these settings: Runtime=Docker (uses ./Dockerfile),
# Health Check Path=/healthz. Render injects PORT; the server binds it automatically.
services:
  - type: web
    name: neon-survivor-server
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free            # free dynos sleep after ~15 min idle (cold start on next connect); bump for always-on
    region: oregon        # pick the region closest to most players
    healthCheckPath: /healthz
    autoDeploy: true
    # Rooms live in-memory in ONE instance — keep a single instance so all clients share the world.
    # (Horizontal scaling needs sticky sessions or a shared store: a future change.)
    numInstances: 1
