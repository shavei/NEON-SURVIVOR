name: Build Android APK

# Packages the game as a standalone native Android app with Capacitor — it runs in the app's
# own Android System WebView (NOT the Chrome app): no address bar, no "Running in Chrome", and
# screen-time is attributed to NEON SURVIVOR. The WebView loads https://neon-survivor.com
# (see capacitor.config.json server.url), so it's the exact same game with the same Supabase
# leaderboard, sign-in and achievements — nothing extra to wire up.
#
# Triggers:
#   • push a tag like v1.0.0  -> builds the APK and publishes it to a GitHub Release
#                                (asset is always neon-survivor.apk, so the
#                                 /releases/latest/download/neon-survivor.apk link stays valid).
#   • manual "Run workflow"   -> builds the APK and uploads it as a run artifact (no release).
#
# Optional repo secrets for a STABLE signing identity (so app updates install over each other):
#   ANDROID_KEYSTORE_BASE64 / ANDROID_KEYSTORE_PASSWORD / ANDROID_KEY_PASSWORD
# If absent, an ephemeral keystore is generated so the APK still builds and sideloads.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies (Capacitor)
        run: npm install

      - name: Resolve version from tag / run number
        id: ver
        run: |
          set -euo pipefail
          REF="${GITHUB_REF_NAME:-dev}"
          VERSION="${REF#v}"
          [ "$VERSION" = "$REF" ] && VERSION="1.0.${GITHUB_RUN_NUMBER}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version $VERSION (code ${GITHUB_RUN_NUMBER})"

      - name: Generate native Android project
        run: |
          set -euo pipefail
          npx cap add android
          npx cap copy android
          # Point Gradle at the runner's Android SDK.
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          # Accept SDK licenses so Gradle can fetch any missing build-tools/platforms.
          yes | "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null 2>&1 || true

      - name: Brand launcher icons
        run: node tools/gen-android-icons.cjs android/app/src/main/res

      - name: Stamp app version
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          node -e "
            const fs=require('fs'); const f='android/app/build.gradle';
            let s=fs.readFileSync(f,'utf8');
            s=s.replace(/versionCode\s+\d+/, 'versionCode '+(Number(process.env.GITHUB_RUN_NUMBER)||1));
            s=s.replace(/versionName\s+\"[^\"]*\"/, 'versionName \"'+process.env.VERSION+'\"');
            fs.writeFileSync(f,s);
            console.log(s.match(/versionCode.*/)[0], '|', s.match(/versionName.*/)[0]);
          "

      - name: Prepare signing keystore
        id: keystore
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          STORE_PASS="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
          KEY_PASS="${{ secrets.ANDROID_KEY_PASSWORD }}"
          if [ -n "$KS_B64" ]; then
            echo "Using provided keystore from secret."
            echo "$KS_B64" | base64 -d > "$GITHUB_WORKSPACE/android.keystore"
            : "${STORE_PASS:?ANDROID_KEYSTORE_PASSWORD required when ANDROID_KEYSTORE_BASE64 is set}"
            : "${KEY_PASS:?ANDROID_KEY_PASSWORD required when ANDROID_KEYSTORE_BASE64 is set}"
          else
            echo "No keystore secret found — generating an ephemeral keystore."
            STORE_PASS="${STORE_PASS:-neonsurvivor}"
            KEY_PASS="${KEY_PASS:-neonsurvivor}"
            keytool -genkeypair -v -keystore "$GITHUB_WORKSPACE/android.keystore" \
              -alias android -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass "$STORE_PASS" -keypass "$KEY_PASS" \
              -dname "CN=NEON SURVIVOR, O=neon-survivor.com, C=US"
          fi
          echo "store_pass=$STORE_PASS" >> "$GITHUB_OUTPUT"
          echo "key_pass=$KEY_PASS" >> "$GITHUB_OUTPUT"

      - name: Build release APK
        working-directory: android
        run: |
          set -euo pipefail
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Sign & align APK
        run: |
          set -euo pipefail
          UNSIGNED=android/app/build/outputs/apk/release/app-release-unsigned.apk
          BT=$(ls -d "$ANDROID_HOME"/build-tools/*/ | sort -V | tail -1)
          echo "Using build-tools at $BT"
          "${BT}zipalign" -p -f 4 "$UNSIGNED" aligned.apk
          "${BT}apksigner" sign \
            --ks "$GITHUB_WORKSPACE/android.keystore" \
            --ks-pass pass:"${{ steps.keystore.outputs.store_pass }}" \
            --ks-key-alias android \
            --key-pass pass:"${{ steps.keystore.outputs.key_pass }}" \
            --out neon-survivor.apk aligned.apk
          "${BT}apksigner" verify --print-certs neon-survivor.apk | grep -i "SHA-256" || true
          ls -la neon-survivor.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: neon-survivor-apk
          path: neon-survivor.apk

      - name: Publish APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: neon-survivor.apk
          fail_on_unmatched_files: true
